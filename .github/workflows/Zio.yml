name: Auto Update Zio.json

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: JSON from Api
      run: |
        curl -o Zio.json "${{ secrets.SOURCE_URL }}"
    
    - name: Validate JSON
      run: |
        if jq empty Zio.json 2>/dev/null; then
          echo "✅ Valid JSON"
        else
          echo "❌ Invalid JSON"
          exit 1
        fi
    
    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Zio.json
        git diff --staged --quiet || git commit -m "Auto-update Zio.json $(date +'%Y-%m-%d %H:%M:%S')"
        git push
