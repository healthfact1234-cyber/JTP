name: Update ZioTvPlus M3U

on:
  schedule:
    - cron: '*/30 * * * *'  # 👈 30 minute
    # - cron: '0 */2 * * *'  # 👈 2 hours 
  workflow_dispatch:
  push:  

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      
    - name: Fetch and update M3U
      env:
        SOURCE_URL: ${{ secrets.SOURCE_URL }}
      run: |
        echo "🔄 Fetching from source..."
        curl -L "$SOURCE_URL" -o temp.m3u
        
        echo "🧹 Cleaning file..."
        
        grep -v "License:" temp.m3u > ZioTvPlus.m3u
        
        
        sed -i '/#KODIPROP:/d' ZioTvPlus.m3u
        
        
        sed -i '/#EXTHTTP:/d' ZioTvPlus.m3u
        
        
        sed -i 's|#EXTVLCOPT:http-user-agent=.*|#EXTVLCOPT:http-user-agent=JioTV.Plus/2.3.1_2041 (Linux;Android 14) AndroidXMedia3/1.4.0|g' ZioTvPlus.m3u
        
        
        sed -i '/#EXTINF:/a #EXTVLCOPT:http-user-agent=JioTV.Plus/2.3.1_2041 (Linux;Android 14) AndroidXMedia3/1.4.0' ZioTvPlus.m3u
        
        
        sed -i '/^$/d' ZioTvPlus.m3u
        
        rm temp.m3u
        
        echo "✅ ZioTvPlus.m3u generated!"
        echo "📊 Total channels: $(grep -c '#EXTINF' ZioTvPlus.m3u)"
        echo "🔧 User-Agent: JioTV.Plus/2.3.1_2041 (Linux;Android 14) AndroidXMedia3/1.4.0"
        
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ZioTvPlus.m3u
        git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
        git push
