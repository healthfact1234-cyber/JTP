name: Update ZioTvPlus M3U

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Fetch and update M3U
      env:
        SOURCE_URL: ${{ secrets.SOURCE_URL }}
      run: |
        if [ -z "$SOURCE_URL" ]; then
          echo "❌ ERROR: SOURCE_URL secret not set!"
          exit 1
        fi
        
        echo "📥 Gettinh Api From JioSTB: $SOURCE_URL"
        curl -L --max-time 60 --retry 3 "$SOURCE_URL" -o temp.m3u
        
        if [ ! -f temp.m3u ] || [ ! -s temp.m3u ]; then
          echo "❌ ERROR: Failed to download M3U file!"
          exit 1
        fi
        
        
        echo "#EXTM3U" > ZioTvPlus.m3u
        echo "# License: https://yowaimo.in/license/" >> ZioTvPlus.m3u
        
       
        
        grep -v "License:" temp.m3u | grep -v "#EXTM3U" >> ZioTvPlus.m3u
        
        
        sed -i '/#KODIPROP:/d' ZioTvPlus.m3u
        sed -i '/#EXTHTTP:/d' ZioTvPlus.m3u
        sed -i 's|#EXTVLCOPT:http-user-agent=.*|#EXTVLCOPT:http-user-agent=JioTvPlus/2.8.4_2076/StreamFlex(StreamFlex;JioSTB) JioTvPlus-AndroidTv|g' ZioTvPlus.m3u
        
        
        sed -i 's|jiotvbpkstb|jiotvpllive|g' ZioTvPlus.m3u
        
        # Clean URLs (remove extra parameters)
        sed -i 's|\(https://[^?]*\)[^ ]*|\1|g' ZioTvPlus.m3u
        
        # Extra empty lines hatao
        sed -i '/^$/d' ZioTvPlus.m3u
        
        rm -f temp.m3u
        
        CHANNEL_COUNT=$(grep -c '#EXTINF' ZioTvPlus.m3u)
        echo "✅ ZioTvPlus.m3u generated!"
        echo "📊 Total channels: $CHANNEL_COUNT"
        echo "🔗 License: https://yowaimo.in/license/"
        echo "🔄 Replaced: jiotvbpkstb → jiotvpllive"
        
        if [ "$CHANNEL_COUNT" -eq 0 ]; then
          echo "❌ ERROR: No channels found!"
          exit 1
        fi
        
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ZioTvPlus.m3u
        
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Changes pushed successfully!"
        fi
