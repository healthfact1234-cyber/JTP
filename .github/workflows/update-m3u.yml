name: Update ZioTvPlus M3U

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Fetch and update M3U
      env:
        SOURCE_URL: ${{ secrets.SOURCE_URL }}
      run: |
        # Secret URL se fetch karo
        curl -L "$SOURCE_URL" -o temp.m3u
        
        # License wali line hatao
        grep -v "License:" temp.m3u > ZioTvPlus.m3u
        
        # User-Agent change karo (old wala replace karo)
        sed -i 's|#EXTVLCOPT:http-user-agent=JioTvPlus/2.3.1_2041 (Linux;Android 14) AndroidXMedia3/1.4.0|#EXTVLCOPT:http-user-agent=JioTvPlus/2.8.4_2076/StreamFlex(StreamFlex;JioSTB) JioTvPlus-AndroidTv|g' ZioTvPlus.m3u
        
        # Cleanup
        rm temp.m3u
        
        echo "✅ ZioTvPlus.m3u generated!"
        echo "📊 Total channels: $(grep -c '#EXTINF' ZioTvPlus.m3u)"
        echo "🔧 User-Agent updated to: JioTvPlus/2.8.4_2076/StreamFlex(StreamFlex;JioSTB) JioTvPlus-AndroidTv"
        
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ZioTvPlus.m3u
        git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
        git push
