name: Update ZioTvPlus M3U

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      
    - name: Fetch and update M3U
      env:
        SOURCE_URL: ${{ secrets.SOURCE_URL }}
      run: |
        curl -L "$SOURCE_URL" -o temp.m3u
        grep -v "^# License:" temp.m3u > ZioTvPlus.m3u
        
        # 1. User-Agent EXTVLCOPT me
        sed -i 's|#EXTVLCOPT:http-user-agent=.*|#EXTVLCOPT:http-user-agent=JioTV.Plus/2.3.1_2041 (Linux;Android 14) AndroidXMedia3/1.4.0|g' ZioTvPlus.m3u
        
        # 2. User-Agent URL me (Tivimate ke liye)
        sed -i 's|\.mpd|.mpd?User-Agent=JioTV.Plus%2F2.3.1_2041%20(Linux%3BAndroid%2014)%20AndroidXMedia3%2F1.4.0|g' ZioTvPlus.m3u
        sed -i 's|\.mpd\?User-Agent|.mpd\&User-Agent|g' ZioTvPlus.m3u
        sed -i 's|\&User-Agent|?User-Agent|g' ZioTvPlus.m3u
        
        # 3. Cookie bhi add karo agar nahi hai
        # (already hai toh theek hai)
        
        rm temp.m3u
        echo "✅ User-Agent added in both places!"
        
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ZioTvPlus.m3u
        git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
        git push
